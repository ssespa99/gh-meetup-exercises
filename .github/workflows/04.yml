name: 04-no-secrets-shared

on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: echo "Token loaded"

      - name: Deploy
        run: ./scripts/deploy.sh